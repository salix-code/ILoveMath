<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ILoveMath — 练习</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="site-header">
        <a href="/" class="back-link">← 返回</a>
        <h1>I Love Math</h1>
        <div id="q-stats" class="header-stats">
          正确: <span id="q-score">0</span> / 已做: <span id="q-total">0</span>
        </div>
      </header>
      <main class="question-wrap">
        <div id="board" class="board">
          <!-- Timer -->
          <div id="q-timer" class="board__timer">00:00</div>

          <!-- 1. Type label -->
          <div id="q-type-label" class="board__type">加载中…</div>

          <!-- 2. Question content -->
          <div id="q-content" class="board__content"></div>

          <!-- 2.5 Tip hint -->
          <div id="q-tip" class="board__tip">
            <div class="tooltip tooltip-right" data-tip="这里是一个简短的指示">
              <span class="tip-trigger">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="12" y1="16" x2="12" y2="12"/>
                  <line x1="12" y1="8"  x2="12.01" y2="8"/>
                </svg>
                提示
              </span>
            </div>
          </div>

          <!-- 3. Answer input -->
          <div class="board__answer">
            <label for="q-answer">答案：</label>
            <input id="q-answer" type="text" placeholder="在此输入答案" autocomplete="off" />
          </div>

          <!-- 4. Action buttons -->
          <div class="board__actions">
            <button id="btn-submit" class="board-btn board-btn--submit">下一题</button>
            <button id="btn-solve"  class="board-btn board-btn--solve">解答</button>
          </div>
        </div>
      </main>
    </div>
    <script src="/static/js/question.js"></script>
  </body>
</html>
